name: Yahoo Lineup Agent

permissions:
  contents: write

"on":
  schedule:
    # Poll once an hour at :30, which aligns with the "30 minutes before the
    # unique starting hour" trigger windows computed in automation.py.
    # GitHub cron is UTC, so a local-time guard below handles DST accurately.
    - cron: "30 15-23,0-3 * * *"
  workflow_dispatch:
    inputs:
      apply_changes:
        description: "Apply roster changes to Yahoo"
        required: false
        default: false
        type: boolean
      lineup_date:
        description: "Roster date in YYYY-MM-DD format; defaults to today in America/Los_Angeles"
        required: false
        type: string
      force_run:
        description: "Ignore time-window gating and run immediately"
        required: false
        default: false
        type: boolean

jobs:
  lineup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: America/Los_Angeles
      YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
      YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
      YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
      YAHOO_TEAM_KEY: ${{ secrets.YAHOO_TEAM_KEY }}
      YAHOO_REDIRECT_URI: oob
      YAHOO_OPEN_AUTH_BROWSER: "false"
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: ${{ secrets.SMTP_TO }}
      SMTP_USE_TLS: "false"
      SMTP_USE_SSL: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore automation state
        shell: bash
        run: |
          mkdir -p .automation
          git fetch origin automation-state || true
          if git show origin/automation-state:.automation/agent_state.json > .automation/agent_state.json 2>/dev/null; then
            echo "Restored automation state."
          else
            echo '{"lineups": {}}' > .automation/agent_state.json
            echo "No prior automation state found."
          fi

      - name: Resolve lineup date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.lineup_date }}" ]; then
            echo "YAHOO_LINEUP_DATE=${{ github.event.inputs.lineup_date }}" >> "$GITHUB_ENV"
            echo "FORCE_RUN=false" >> "$GITHUB_ENV"
          else
            LOCAL_HOUR=$(date +%H)
            if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$LOCAL_HOUR" -eq 20 ]; then
              echo "YAHOO_LINEUP_DATE=$(date -d tomorrow +%F)" >> "$GITHUB_ENV"
              echo "FORCE_RUN=true" >> "$GITHUB_ENV"
            else
              echo "YAHOO_LINEUP_DATE=$(date +%F)" >> "$GITHUB_ENV"
              echo "FORCE_RUN=false" >> "$GITHUB_ENV"
            fi
          fi

      - name: Evaluate active window
        id: active_window
        if: ${{ github.event_name != 'workflow_dispatch' }}
        shell: bash
        run: |
          LOCAL_HOUR=$(date +%H)
          if [ "$LOCAL_HOUR" -lt 8 ] || [ "$LOCAL_HOUR" -ge 21 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run outside local active window (8:00 AM-8:59 PM)."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry run lineup automation
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.apply_changes }}
        run: >
          python automation.py
          --email
          ${{ (inputs.force_run || env.FORCE_RUN == 'true') && '--force' || '' }}

      - name: Apply lineup changes
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.apply_changes) || (github.event_name != 'workflow_dispatch' && steps.active_window.outputs.should_run == 'true') }}
        run: >
          python automation.py
          --apply
          --email
          ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_run) || env.FORCE_RUN == 'true') && '--force' || '' }}

      - name: Persist automation state
        if: ${{ always() }}
        shell: bash
        run: |
          if [ ! -f .automation/agent_state.json ]; then
            echo "No automation state file to persist."
            exit 0
          fi

          STATE_TMP=$(mktemp -d)
          cp .automation/agent_state.json "$STATE_TMP/agent_state.json"
          git fetch origin automation-state || true

          if git ls-remote --exit-code origin automation-state >/dev/null 2>&1; then
            git worktree add --detach "$STATE_TMP/worktree" origin/automation-state
          else
            git worktree add --detach "$STATE_TMP/worktree"
            (
              cd "$STATE_TMP/worktree"
              git switch --orphan automation-state
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          mkdir -p "$STATE_TMP/worktree/.automation"
          cp "$STATE_TMP/agent_state.json" "$STATE_TMP/worktree/.automation/agent_state.json"

          (
            cd "$STATE_TMP/worktree"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .automation/agent_state.json
            git commit -m "Update automation state" || exit 0
            git push origin HEAD:automation-state
          )
